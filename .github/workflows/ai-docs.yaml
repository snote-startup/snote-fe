name: AI Documentation Generator

on:
    pull_request:
        types: [opened, synchronize]

permissions:
    contents: read
    pull-requests: write

jobs:
    ai-docs:
        name: Generate PR Documentation
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Get PR changes
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} > /tmp/pr_diff.txt
                  gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --name-only > /tmp/changed_files.txt
                  STATS=$(git diff --stat origin/${{ github.event.pull_request.base.ref }}...HEAD 2>/dev/null || echo "Stats unavailable")
                  echo "$STATS" > /tmp/diff_stats.txt

            - name: Generate documentation
              env:
                  OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
                  OPENCODE_MODEL: ${{ vars.OPENCODE_MODEL || 'deepseek-v4-flash-free' }}
                  PR_TITLE: ${{ github.event.pull_request.title }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
              run: |
                  cat > /tmp/build_prompt.py << 'PYTHON_SCRIPT'
                  import json, os

                  diff = open("/tmp/pr_diff.txt").read()
                  files = open("/tmp/changed_files.txt").read()
                  stats = open("/tmp/diff_stats.txt").read()
                  model = os.environ.get("OPENCODE_MODEL") or "deepseek-v4-flash-free"
                  pr_title = os.environ.get("PR_TITLE", "")

                  if len(diff) > 30000:
                      diff = diff[:30000] + "... [diff truncated]"

                  prompt = f"""You are a technical documentation specialist. Analyze the following Pull Request and generate a comprehensive PR description.

                  PR Title: {pr_title}

                  Changed Files:
                  {files}

                  Diff Stats:
                  {stats}

                  Code Diff:
                  ```diff
                  {diff}
                  ```

                  Generate a well-structured PR description in the following format:

                  ## Mô tả thay đổi (UI/UX & Features)
                  Mô tả ngắn gọn mục đích của PR. Nhấn mạnh vào thay đổi giao diện hoặc luồng người dùng nếu có.

                  ## Kiến trúc Component & State
                  Liệt kê các thay đổi quan trọng liên quan đến cấu trúc Component, Hooks, hoặc State Management (Redux/Zustand/Context...).

                  ## Files đã thay đổi
                  Bảng tóm tắt files thay đổi với mô tả ngắn.
                  | File | Thay đổi |
                  |------|----------|
                  | ... | ... |

                  ## Cần test (Checklist)
                  Liệt kê các kịch bản cần test trên UI (Responsive, API Integration, Edge cases).

                  ---
                  > *Documentation generated by AI ({model})*

                  Write the documentation in Vietnamese. Be concise and accurate."""

                  payload = json.dumps({
                      "model": model,
                      "messages": [
                          {"role": "system", "content": "You are a technical documentation specialist for a modern Frontend Web Application (React/Vue/Next.js). You focus on UI component changes, styling updates, state management, and API integrations. Output clean, readable Markdown in Vietnamese."},
                          {"role": "user", "content": prompt}
                      ],
                      "temperature": 0.3,
                      "max_tokens": 4096
                  })

                  with open("/tmp/payload.json", "w") as f:
                      f.write(payload)

                  print(f"Payload built successfully for OpenCode model: {model}")
                  PYTHON_SCRIPT

                  python3 /tmp/build_prompt.py

                  RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://opencode.ai/zen/v1/chat/completions" \
                    -H "Content-Type: application/json" \
                    -H "X-API-Key: ${OPENCODE_API_KEY}" \
                    -H "User-Agent: Mozilla/5.0" \
                    -H "Accept: application/json" \
                    -d @/tmp/payload.json)

                  HTTP_CODE=$(echo "$RESPONSE" | tail -1)
                  BODY=$(echo "$RESPONSE" | sed '$d')

                  if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
                    echo "$BODY" | python3 -c '
                  import json, sys
                  data = json.load(sys.stdin)
                  if "choices" in data and len(data["choices"]) > 0:
                      print(data["choices"][0]["message"]["content"])
                  else:
                      print("Unexpected response format.")
                  ' > /tmp/pr_docs.md
                  else
                    echo "API Error: HTTP $HTTP_CODE" > /tmp/pr_docs.md
                    echo "" >> /tmp/pr_docs.md
                    echo "Response preview:" >> /tmp/pr_docs.md
                    printf '%s' "$BODY" | head -c 1000 >> /tmp/pr_docs.md
                    echo "" >> /tmp/pr_docs.md
                    echo "API Error: HTTP $HTTP_CODE"
                    printf '%s' "$BODY" | head -c 1000
                    echo ""
                  fi

            - name: Update PR description
              env:
                  GH_TOKEN: ${{ github.token }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
              run: |
                  DOCS=$(cat /tmp/pr_docs.md)
                  CURRENT_BODY=$(gh pr view "$PR_NUMBER" --repo ${{ github.repository }} --json body --jq '.body' || echo "")

                  if echo "$CURRENT_BODY" | grep -q "AI_DOCS_START"; then
                    CLEAN_BODY=$(echo "$CURRENT_BODY" | sed '/PR_DOCS_START/,/PR_DOCS_END/d' | sed '/^$/N;/^\n$/d')
                  else
                    CLEAN_BODY="$CURRENT_BODY"
                  fi

                  cat > /tmp/new_body.md << BODY_EOF
                  ${CLEAN_BODY}

                  <!-- PR_DOCS_START -->
                  ---
                  ${DOCS}
                  <!-- PR_DOCS_END -->
                  BODY_EOF

                  gh pr edit "$PR_NUMBER" \
                    --repo ${{ github.repository }} \
                    --body-file /tmp/new_body.md
